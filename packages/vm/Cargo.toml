[package]
authors = ["Band Protocol <connect@bandprotocol.com>"]
description = "Oracle script VM runtime"
edition = "2021"
license = "Apache-2.0"
name = "owasm-vm"
readme = "README.md"
repository = "https://github.com/bandprotocol/owasm/tree/master/packages/vm"
version = "0.3.1"

[dependencies]
assert_matches = "1.3.0"
clru = "0.2.0"
hex = "0.4"
owasm-crypto = { path = "../crypto", version = "0.3.1" }
sha2 = "0.9.1"
tempfile = ">=3.1.0, <3.20"
home = ">=0.5, <0.5.9"
rayon = ">=1.0, <1.12"
rayon-core = ">=1.0, <1.13"
backtrace = ">=0.3, <0.3.74"
addr2line = ">=0.17, <0.22"
wasm-instrument = { version = "0.4.0", default-features = false, features = [
  "sign_ext",
] }
wasmer = { version = "2.3.0", default-features = false, features = [
  "singlepass",
  "compiler",
  "universal",
] }
wasmer-middlewares = "2.3.0"
